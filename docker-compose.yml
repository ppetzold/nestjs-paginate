services:
  postgres:
    container_name: postgres_nestjs_paginate
    # PostGIS image (a superset of stock postgres) so the $dist PostGIS strategy is testable locally.
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: test
    ports:
      - "${POSTGRESS_DB_PORT:-5432}:5432"

  mariadb:
    container_name: mariadb_nestjs_paginate
    image: mariadb:latest
    environment:
      MYSQL_ROOT_PASSWORD: pass
      MYSQL_DATABASE: test
    ports:
      - "${MARIA_DB_PORT:-3306}:3306"
